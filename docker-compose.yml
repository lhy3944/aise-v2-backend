services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aise2_preview_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aise1234}
      POSTGRES_DB: ${POSTGRES_DB:-aise}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aise}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: aise2_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aise}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aise1234}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: aise2_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aise2_backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aise}:${POSTGRES_PASSWORD:-aise1234}@postgres:5432/${POSTGRES_DB:-aise}
      LANGGRAPH_CHECKPOINT_URL: postgresql://${POSTGRES_USER:-aise}:${POSTGRES_PASSWORD:-aise1234}@postgres:5432/${POSTGRES_DB:-aise}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-prod}
      CORS_ORIGINS: "http://${HOST_IP:-localhost}:4000"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-aise}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-aise1234}
      MINIO_BUCKET: ${MINIO_BUCKET:-aise-knowledge}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        BACKEND_URL: "http://backend:8081"
    container_name: aise2_frontend
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      BACKEND_URL: "http://backend:8081"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  redis_data:
